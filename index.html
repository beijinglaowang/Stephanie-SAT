<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#f5f1ea" />
    <title>Stephanie SAT</title>
    <link rel="stylesheet" href="styles.css?v=4" />
  </head>
  <body>
    <main class="app-shell">
      <section class="topbar" aria-label="Flashcard status">
        <div>
          <p class="eyebrow">Stephanie SAT</p>
          <h1>Vocabulary Flashcards</h1>
        </div>
        <div class="counter" id="counter">1 / 263</div>
      </section>

      <section class="listbar" aria-label="Word lists">
        <button class="list-pill is-active" id="unknownFilter" type="button">
          <span class="list-icon" aria-hidden="true">?</span>
          <span>???</span>
          <strong id="unknownCount">263</strong>
        </button>
        <button class="list-pill" id="knownFilter" type="button">
          <span class="list-icon" aria-hidden="true">&#10003;</span>
          <span>&#10003;&#10003;&#10003;</span>
          <strong id="knownCount">0</strong>
        </button>
        <button class="sync-pill" id="syncToggle" type="button">
          <span id="syncStatus">Sync</span>
        </button>
      </section>

      <section class="sync-panel" id="syncPanel" aria-label="Sync settings" hidden>
        <input id="syncToken" type="password" autocomplete="off" placeholder="GitHub token" />
        <button class="mini-button" id="saveToken" type="button">Save</button>
        <button class="mini-button ghost" id="clearToken" type="button">Clear</button>
      </section>

      <section class="stage" aria-live="polite">
        <button class="card" id="card" type="button" aria-label="Flip flashcard">
          <span class="card-face card-front" aria-hidden="false">
            <span class="state-badge" id="frontBadge">???</span>
            <span class="word" id="word">Loading</span>
          </span>
          <span class="card-face card-back" aria-hidden="true">
            <span class="state-badge" id="backBadge">???</span>
            <span class="definition" id="definition"></span>
            <span class="rule"></span>
            <span class="field">
              <span class="label">Synonyms</span>
              <span id="synonyms"></span>
            </span>
            <span class="field">
              <span class="label">Antonyms</span>
              <span id="antonyms"></span>
            </span>
            <span class="field sentence">
              <span class="label">Sentence</span>
              <span id="sentence"></span>
            </span>
            <span class="field root">
              <span class="label">Root</span>
              <span id="root"></span>
            </span>
          </span>
        </button>
      </section>

      <section class="card-action" aria-label="Move word between lists">
        <button class="go-button" id="go" type="button">Switch</button>
      </section>

      <nav class="controls" aria-label="Card navigation">
        <button class="nav-button" id="prev" type="button" aria-label="Previous word">
          <span class="nav-icon" aria-hidden="true">&lsaquo;</span>
          <span>Previous</span>
        </button>
        <div class="progress-wrap" aria-hidden="true">
          <div class="progress" id="progress"></div>
        </div>
        <button class="nav-button primary" id="next" type="button" aria-label="Next word">
          <span>Next</span>
          <span class="nav-icon" aria-hidden="true">&rsaquo;</span>
        </button>
      </nav>
    </main>

    <script src="data/cards.js?v=4"></script>
    <script src="app.js?v=4"></script>
  </body>
</html>
